name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  CSV_URL: "train_pca.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run MLflow Project
      - name: Run MLflow Project
        run: |
          mlflow run . --env-manager local

      # Configure Git, Git LFS, and push mlruns
      - name: Save MLflow artifacts
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Configure Git LFS
          git lfs install
          git lfs track "mlruns/**"

          # Commit .gitattributes if it changes
          git add .gitattributes
          git commit -m "Configure Git LFS" || true

          # Commit MLflow results
          git add -f mlruns/
          git commit -m "Save mlruns from CI run" || true

          # Push all commits
          git push origin main
